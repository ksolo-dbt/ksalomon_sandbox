    maturity: high
    url: https://fishtown.looker.com/dashboards/493
    description: 
      Did someone say "exponential growth"?
    
    depends_on:
      - ref('fct_orders')
      - ref('dim_suppliers')
      
    owner:
      name: Isabela 
