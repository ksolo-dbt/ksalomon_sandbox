version: 2

models:
  - name: stg_lifestance_patients
    description: |
      Cleaned patient demographics from LifeStance. One row per patient.
      Strings are trimmed and patient_dob/patient_age are cast to appropriate types.
      The source primary key `patient_pkey` is renamed to `patient_key` for consistency with downstream joins.
    columns:
      - name: patient_uid
        description: Surrogate numeric identifier for the patient.
      - name: licensekey
        description: License key identifying the clinic or practice location associated with the patient.
      - name: patient_key
        description: Primary key for the patient in the source EHR system (renamed from patient_pkey).
        data_tests:
          - unique
          - not_null
      - name: patient_chartnumber_key
        description: Alternate patient identifier (chart number) used for clinical recordkeeping.
      - name: patient_first_name
        description: Patient's first name.
      - name: patient_last_name
        description: Patient's last name.
      - name: patient_dob
        description: Patient's date of birth.
      - name: patient_age
        description: Patient's current age in years.
      - name: patient_gender
        description: Patient's self-reported gender.
      - name: patient_marital_status
        description: Patient's marital status.
      - name: patient_race
        description: Patient's self-reported race/ethnicity.
      - name: patient_region
        description: Geographic region where the patient resides.
      - name: patient_state
        description: U.S. state where the patient resides.

  - name: stg_lifestance_clinicians
    description: |
      Cleaned clinician reference data. One row per clinician.
      Strings are trimmed and tenure is cast to number. The source primary key
      `clinician_pgprof_key` is renamed to `clinician_key`.
    columns:
      - name: clinician_key
        description: Primary key for the clinician (renamed from clinician_pgprof_key).
        data_tests:
          - unique
          - not_null
      - name: clinician_name
        description: Full name of the clinician.
      - name: clinician_type
        description: Clinician type classification (e.g., therapist, prescriber).
      - name: expected_discipline
        description: Expected clinical discipline or specialty for this clinician.
      - name: clinician_status
        description: Employment or credentialing status of the clinician (e.g., active, inactive).
      - name: clinician_months_tenure
        description: Number of months the clinician has been employed at LifeStance.

  - name: stg_lifestance_diagnosis_lookup
    description: |
      Cleaned ICD diagnosis code lookup. One row per code mapping to a diagnostic grouping
      used for outcome analysis (e.g., depression, anxiety, ADHD).
    columns:
      - name: diagnosis_code
        description: ICD diagnosis code (renamed from diagnosiscode).
        data_tests:
          - unique
          - not_null
      - name: diagnosis_group
        description: Diagnostic group the code belongs to (e.g., depression, anxiety, ADHD).

  - name: stg_lifestance_diagnosis_visit_link
    description: |
      Cleaned bridge table linking patients and appointment visits to associated ICD diagnosis codes.
      One row per visit × diagnosis combination.
    columns:
      - name: patient_key
        description: Foreign key to stg_lifestance_patients.patient_key.
        data_tests:
          - not_null
      - name: appointment_key
        description: Foreign key to stg_lifestance_last_episode_of_care.appointment_key (renamed from v_appt_pkey).
        data_tests:
          - not_null
      - name: diagnosis_code
        description: ICD diagnosis code recorded for this visit — foreign key to stg_lifestance_diagnosis_lookup.diagnosis_code.
        data_tests:
          - not_null

  - name: stg_lifestance_last_episode_of_care
    description: |
      Cleaned visit fact table for each patient's most recent continuous episode of care.
      One row per visit. The source primary key `v_appt_pkey` is renamed to `appointment_key`
      and `clinician_pgprof_key` is renamed to `clinician_key`. Date fields are cast to date.
    columns:
      - name: patient_key
        description: Foreign key to stg_lifestance_patients.patient_key.
        data_tests:
          - not_null
      - name: patient_chartnumber_key
        description: Alternate patient identifier (chart number).
      - name: appointment_key
        description: Primary key for the appointment/visit (renamed from v_appt_pkey).
        data_tests:
          - unique
          - not_null
      - name: date_of_service
        description: Date of service for the visit.
      - name: visit_number
        description: Sequential visit number within the patient's episode of care.
      - name: episode_first_visit_date
        description: Date of the first visit in the patient's most recent episode of care.
      - name: episode_latest_visit_date
        description: Date of the most recent visit in the patient's last episode of care.
      - name: discipline
        description: Clinical discipline under which the visit was conducted (e.g., therapy, medication management).
      - name: appointment_type
        description: Appointment type classification for the visit.
      - name: visit_modality
        description: Visit modality (e.g., in-person, telehealth).
      - name: clinician_key
        description: Foreign key to stg_lifestance_clinicians.clinician_key.
      - name: clinician_name
        description: Name of the clinician who conducted the visit.
      - name: clinician_type
        description: Type classification of the clinician who conducted the visit.
      - name: region
        description: Geographic region where the visit took place.
      - name: state
        description: U.S. state where the visit took place.

  - name: stg_lifestance_outcomes_review_ccp
    description: |
      Cleaned outcome-review notes capturing whether outcomes were reviewed and whether a
      Clinical Care Pathway was utilized at the visit level. One row per outcome-review note.
    columns:
      - name: patient_key
        description: Foreign key to stg_lifestance_patients.patient_key.
        data_tests:
          - not_null
      - name: appointment_key
        description: Foreign key to stg_lifestance_last_episode_of_care.appointment_key (renamed from v_appt_pkey).
        data_tests:
          - not_null
      - name: note_date
        description: Date the outcome review note was recorded.
      - name: outcomes_reviewed
        description: Indicates whether outcomes were reviewed during this visit.
      - name: ccp_utilized
        description: Boolean flag — true if a Clinical Care Pathway (CCP) was utilized or referred to during this encounter.

  - name: stg_lifestance_amd_field
    description: |
      Cleaned AdvancedMD (AMD) EHR field lookup. One row per field. Maps Field_UID to the
      field names used across the PHQ-9 and GAD-7 outcome value tables.
      Known field IDs: 1001 = PHQ-9 score, 1002 = PHQ-9 date, 1003 = GAD-7 score, 1004 = GAD-7 date.
    columns:
      - name: field_uid
        description: Primary key for the AMD field (e.g., 1001 = PHQ-9 score, 1002 = PHQ-9 date, 1003 = GAD-7 score, 1004 = GAD-7 date).
        data_tests:
          - unique
          - not_null
      - name: field_name
        description: Human-readable name of the AMD field.

  - name: stg_lifestance_amd_fieldvalue
    description: |
      Cleaned PHQ-9 and GAD-7 outcomes sourced from the Phreesia/EHR patient health record (PHR) integration.
      Transforms raw EAV rows into one row per patient × appointment with PHQ-9 and GAD-7 scores/dates pivoted into columns.

      Transformation logic:
      - Deduplicates repeat submissions for the same patient/submission/field by keeping the most recent (max createdat).
      - Uses createdat as the submission grain when appointment_fid is null so separate portal submissions are preserved.
      - Pivots field_fid 1001/1002/1003/1004 into phq9_score, phq9_date, gad7_score, gad7_date.
      - Extracts numeric scores from potentially messy raw strings using regex cleanup before casting.
    columns:
      - name: licensekey
        description: License key identifying the clinic or practice — part of the composite patient and appointment keys.
      - name: patient_fid
        description: Patient foreign key in the AMD EHR system. Combined with licensekey to uniquely identify the patient.
        data_tests:
          - not_null
      - name: appointment_fid
        description: Appointment foreign key in the AMD EHR system. Combined with licensekey to identify the appointment.
        data_tests:
          - not_null
      - name: phq9_score
        description: PHQ-9 depression assessment score (cleaned numeric — field_fid 1001).
      - name: phq9_date
        description: PHQ-9 assessment date (field_fid 1002).
      - name: gad7_score
        description: GAD-7 anxiety assessment score (cleaned numeric — field_fid 1003).
      - name: gad7_date
        description: GAD-7 assessment date (field_fid 1004).
      - name: first_submitted_at
        description: Earliest submission timestamp for the row across the pivoted fields.

  - name: stg_lifestance_amd_patientnotecontrol
    description: |
      Cleaned PHQ-9 and GAD-7 outcomes sourced from the AdvancedMD Patient Portal.
      Same shape as stg_lifestance_amd_fieldvalue but a different collection channel.
      Note: appointment_fid may be null for Patient Portal submissions.

      Transformation logic:
      - Deduplicates repeat submissions for the same patient/appointment/field by keeping the earliest createdat.
      - Pivots field_fid 1001/1002/1003/1004 into phq9_score, phq9_date, gad7_score, gad7_date.
      - Extracts numeric scores from potentially messy raw strings using regex cleanup before casting.
    columns:
      - name: licensekey
        description: License key identifying the clinic or practice — part of the composite patient and appointment keys.
      - name: patient_fid
        description: Patient foreign key in the AMD EHR system. Combined with licensekey to uniquely identify the patient.
        data_tests:
          - not_null
      - name: appointment_fid
        description: Appointment foreign key in the AMD EHR system. May be null for Patient Portal submissions.
      - name: phq9_score
        description: PHQ-9 depression assessment score (cleaned numeric — field_fid 1001).
      - name: phq9_date
        description: PHQ-9 assessment date (field_fid 1002).
      - name: gad7_score
        description: GAD-7 anxiety assessment score (cleaned numeric — field_fid 1003).
      - name: gad7_date
        description: GAD-7 assessment date (field_fid 1004).
      - name: first_submitted_at
        description: Earliest submission timestamp for the row across the pivoted fields.
