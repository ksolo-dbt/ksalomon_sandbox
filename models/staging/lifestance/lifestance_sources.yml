version: 2

sources:
  - name: lifestance_raw
    description: |
      Raw and pre-built source data from LifeStance Health, a behavioral health organization, covering PHQ-9 and GAD-7 clinical outcome measurement.

      Two-tier structure:
      - Raw tables (require transformation): amd_field, amd_fieldvalue_phq9_gad7_outcomes_phr, amd_patientnotecontrol_phq9_gad7_outcomes
      - Pre-built dimension tables (use as provided): patients, clinicians, diagnosis_lookup, diagnosis_visit_link, last_episode_of_care, outcomes_review_ccp

      Clinical definitions:
      - Baseline: the patient's first measure, linked to their first visit in the last episode of care
      - Qualified patient: baseline ≥ 5 on the first visit, with ≥ 2 measures on different dates and time elapsed between first and last
      - MCID (Minimum Clinically Important Difference): PHQ-9 reduction ≥ 5 points; GAD-7 reduction ≥ 4 points
      - 50% response: reduction of ≥ 50% from baseline
      - Remission: baseline ≥ 5 followed by a later score below 5
      - PHQ-9 severity bands: 0–4 minimal · 5–9 mild · 10–14 moderate · 15–19 moderately severe · 20–27 severe
      - GAD-7 severity bands: 0–4 minimal · 5–9 mild · 10–14 moderate · 15–21 severe
    database: analytics
    schema: zz_lifestance_csv_artifacts
    tables:

      # -----------------------------------------------------------------------
      # Pre-built dimension tables (use as provided)
      # -----------------------------------------------------------------------

      - name: patients
        description: Patient demographics. One row per patient. PK is patient_pkey.
        columns:
          - name: patient_uid
            description: Surrogate numeric identifier for the patient.
          - name: licensekey
            description: License key identifying the clinic or practice location associated with the patient.
          - name: patient_pkey
            description: Primary key for the patient in the source EHR system.
            quote: true
            data_tests:
              - unique
              - not_null
          - name: patient_chartnumber_pkey
            description: Chart number primary key — an alternate patient identifier used for clinical recordkeeping.
          - name: patient_first_name
            description: Patient's first name.
          - name: patient_last_name
            description: Patient's last name.
          - name: patient_dob
            description: Patient's date of birth (ISO format YYYY-MM-DD).
          - name: patient_age
            description: Patient's current age in years.
          - name: patient_gender
            description: Patient's self-reported gender.
          - name: patient_marital_status
            description: Patient's marital status.
          - name: patient_race
            description: Patient's self-reported race/ethnicity.
          - name: patient_region
            description: Geographic region where the patient resides.
          - name: patient_state
            description: U.S. state where the patient resides.

      - name: clinicians
        description: Clinician reference table. One row per clinician. PK is clinician_pgprof_key.
        columns:
          - name: clinician_pgprof_key
            description: Primary key for the clinician in the source EHR system.
            quote: true
            data_tests:
              - unique
              - not_null
          - name: clinician_name
            description: Full name of the clinician.
          - name: clinician_type
            description: Clinician type classification (e.g., therapist, prescriber).
          - name: expected_discipline
            description: Expected clinical discipline or specialty for this clinician.
          - name: clinician_status
            description: Employment or credentialing status of the clinician (e.g., active, inactive).
          - name: clinician_months_tenure
            description: Number of months the clinician has been employed at LifeStance.

      - name: diagnosis_lookup
        description: Lookup table mapping ICD diagnosis codes to diagnostic groupings used for outcome analysis. One row per code.
        columns:
          - name: diagnosiscode
            description: ICD diagnosis code.
            quote: true
            data_tests:
              - unique
              - not_null
          - name: dx_group
            description: Diagnostic group the code belongs to (e.g., depression, anxiety, ADHD).

      - name: diagnosis_visit_link
        description: Bridge table linking patients and appointment visits to associated ICD diagnosis codes. One row per visit × diagnosis combination.
        columns:
          - name: patient_key
            description: Foreign key to patients.patient_pkey.
            quote: true
            data_tests:
              - not_null
          - name: v_appt_pkey
            description: Appointment primary key — foreign key to last_episode_of_care.v_appt_pkey.
            quote: true
            data_tests:
              - not_null
          - name: diagnosiscode
            description: ICD diagnosis code recorded for this visit — foreign key to diagnosis_lookup.diagnosiscode.
            quote: true
            data_tests:
              - not_null

      - name: last_episode_of_care
        description: |
          Visit fact table for each patient's most recent continuous episode of care. One row per visit.
          PK is v_appt_pkey. Foreign keys: patient_key → patients, clinician_pgprof_key → clinicians.
        columns:
          - name: patient_key
            description: Foreign key to patients.patient_pkey.
            quote: true
            data_tests:
              - not_null
          - name: patient_chartnumber_pkey
            description: Alternate patient identifier (chart number).
          - name: v_appt_pkey
            description: Primary key for the appointment/visit.
            quote: true
            data_tests:
              - unique
              - not_null
          - name: v_dos
            description: Date of service for the visit (ISO format YYYY-MM-DD).
          - name: visit_number
            description: Sequential visit number within the patient's episode of care.
          - name: last_episode_first_visit
            description: Date of the first visit in the patient's most recent episode of care.
          - name: last_episode_latest_visit
            description: Date of the most recent visit in the patient's last episode of care.
          - name: v_discipline
            description: Clinical discipline under which the visit was conducted (e.g., therapy, medication management).
          - name: v_appt_types
            description: Appointment type classification for the visit.
          - name: v_visit_modality
            description: Visit modality (e.g., in-person, telehealth).
          - name: clinician_pgprof_key
            description: Foreign key to clinicians.clinician_pgprof_key.
          - name: clinician_name
            description: Name of the clinician who conducted the visit.
          - name: clinician_type
            description: Type classification of the clinician who conducted the visit.
          - name: v_region
            description: Geographic region where the visit took place.
          - name: v_state
            description: U.S. state where the visit took place.

      - name: outcomes_review_ccp
        description: One row per outcome-review note. Captures whether outcomes were reviewed and whether a Clinical Care Pathway was utilized at the visit level. Keys are patient_key and v_appt_pkey.
        columns:
          - name: patient_key
            description: Foreign key to patients.patient_pkey.
            quote: true
            data_tests:
              - not_null
          - name: v_appt_pkey
            description: Foreign key to last_episode_of_care.v_appt_pkey.
            quote: true
            data_tests:
              - not_null
          - name: note_date
            description: Date the outcome review note was recorded (ISO format YYYY-MM-DD).
          - name: outcomes_reviewed
            description: Indicates whether outcomes were reviewed during this visit.
          - name: Clinical_Care_Pathway_was_utilized_or_referred_to
            description: Boolean flag — true if a Clinical Care Pathway (CCP) was utilized or referred to during this encounter.

      # -----------------------------------------------------------------------
      # Raw tables (require transformation)
      # -----------------------------------------------------------------------

      - name: amd_field
        description: |
          AdvancedMD (AMD) EHR field lookup table. One row per field. Maps FieldFID to field names used across the PHQ-9 and GAD-7 outcome value tables.
          Known field IDs: 1001 = PHQ-9 score, 1002 = PHQ-9 date, 1003 = GAD-7 score, 1004 = GAD-7 date.
        columns:
          - name: Field_UID
            description: Primary key for the AMD field (e.g., 1001 = PHQ-9 score, 1002 = PHQ-9 date, 1003 = GAD-7 score, 1004 = GAD-7 date).
            quote: true
            data_tests:
              - unique
              - not_null
          - name: FieldName
            description: Human-readable name of the AMD field.

      - name: amd_fieldvalue_phq9_gad7_outcomes_phr
        description: |
          Raw PHQ-9 and GAD-7 field values sourced from the Phreesia/EHR patient health record (PHR) integration. One row per field value per appointment (vertical/EAV structure — requires pivot).
          Keys: patientfid + licensekey identify the patient; appointmentfid + licensekey identify the appointment; FieldFID references amd_field.
          createdat is the assessment submission timestamp.

          Data quality notes:
          - Raw values are not guaranteed clean numerics; a number may appear alongside labels or units.
          - The same measure can be submitted more than once on the same date.
          - Some appointmentfid values may not match any visit in last_episode_of_care.
          - Outcome submissions may fall on or between visit dates.
          - Outcomes for the same patient may also arrive via amd_patientnotecontrol_phq9_gad7_outcomes; both sources must be reconciled.
        columns:
          - name: licensekey
            description: License key identifying the clinic or practice — part of the composite patient and appointment keys.
          - name: patientfid
            description: Patient foreign key in the AMD EHR system. Combined with licensekey to uniquely identify the patient.
            quote: true
            data_tests:
              - not_null
          - name: appointmentfid
            description: Appointment foreign key in the AMD EHR system. Combined with licensekey to identify the appointment. May not match a visit in last_episode_of_care.
            quote: true
            data_tests:
              - not_null
          - name: FieldFID
            description: Foreign key to amd_field.Field_UID, identifying which outcome field this row represents (1001 = PHQ-9 score, 1002 = PHQ-9 date, 1003 = GAD-7 score, 1004 = GAD-7 date).
            quote: true
            data_tests:
              - not_null
          - name: value
            description: Raw recorded value for this field. May contain non-numeric characters alongside numeric scores — requires cleaning before use.
          - name: createdby
            description: User or system that created this field value record.
          - name: createdat
            description: Timestamp when this field value was submitted (ISO format).

      - name: amd_patientnotecontrol_phq9_gad7_outcomes
        description: |
          Raw PHQ-9 and GAD-7 field values sourced from the AdvancedMD Patient Portal. One row per field value (vertical/EAV structure — requires pivot). Same structure as amd_fieldvalue_phq9_gad7_outcomes_phr but from a different collection channel.
          Note: appointmentfid may be absent for Patient Portal submissions.

          Data quality notes:
          - Raw values are not guaranteed clean numerics; a number may appear alongside labels or units.
          - The same measure can be submitted more than once on the same date.
          - appointmentfid may be null or absent — appointment reference cannot be assumed.
          - Outcomes for the same patient may also arrive via amd_fieldvalue_phq9_gad7_outcomes_phr; both sources must be reconciled.
        columns:
          - name: licensekey
            description: License key identifying the clinic or practice — part of the composite patient and appointment keys.
          - name: patientfid
            description: Patient foreign key in the AMD EHR system. Combined with licensekey to uniquely identify the patient.
            quote: true
            data_tests:
              - not_null
          - name: appointmentfid
            description: Appointment foreign key in the AMD EHR system. May be absent for Patient Portal submissions.
          - name: FieldFID
            description: Foreign key to amd_field.Field_UID, identifying which outcome field this row represents (1001 = PHQ-9 score, 1002 = PHQ-9 date, 1003 = GAD-7 score, 1004 = GAD-7 date).
            quote: true
            data_tests:
              - not_null
          - name: value
            description: Raw recorded value for this field. May contain non-numeric characters alongside numeric scores — requires cleaning before use.
          - name: createdby
            description: User or system that created this note control record.
          - name: createdat
            description: Timestamp when this note control record was created (ISO format).

      # -----------------------------------------------------------------------
      # Final output / answer key (patient-level rollup — visit-level is the target)
      # -----------------------------------------------------------------------

      - name: cqo_phq9_gad7_patient_level
        description: |
          Patient-level aggregate outcomes for PHQ-9 (depression) and GAD-7 (anxiety) assessments across the last episode of care. One row per patient.
          This table is the patient-level rollup provided as the answer key validation reference. The production reporting target is visit-level (one row per episode-of-care visit with patient metrics repeated), which feeds Power BI reporting.

          Clinical definitions applied:
          - Baseline: first measure linked to the first visit in the last episode of care
          - Qualified patient: baseline ≥ 5 on the first visit, ≥ 2 measures on different dates with time elapsed between first and last
          - MCID: PHQ-9 reduction ≥ 5 points; GAD-7 reduction ≥ 4 points
          - 50% response: ≥ 50% reduction from baseline
          - Remission: baseline ≥ 5 followed by a later score below 5
          - PHQ-9 severity: 0–4 minimal · 5–9 mild · 10–14 moderate · 15–19 moderately severe · 20–27 severe
          - GAD-7 severity: 0–4 minimal · 5–9 mild · 10–14 moderate · 15–21 severe
        columns:
          - name: patient_key
            description: Primary key — foreign key to patients.patient_pkey.
            quote: true
            data_tests:
              - unique
              - not_null
          - name: patient_chartnumber_pkey
            description: Alternate patient identifier (chart number).
          - name: patient_fullname
            description: Patient's full name.
          - name: patient_age
            description: Patient's current age in years.
          - name: patient_gender
            description: Patient's self-reported gender.
          - name: patient_marital_status
            description: Patient's marital status.
          - name: patient_race
            description: Patient's self-reported race/ethnicity.
          - name: patient_state
            description: U.S. state where the patient resides.
          - name: last_episode_first_visit
            description: Date of the first visit in the patient's most recent episode of care.
          - name: last_episode_latest_visit
            description: Date of the most recent visit in the patient's last episode of care.
          - name: last_episode_total_visits
            description: Total number of visits in the patient's most recent episode of care.
          - name: phq9_total_measures
            description: Total number of PHQ-9 assessments administered during the episode.
          - name: phq9_first_measure
            description: Baseline PHQ-9 score — the first measure recorded, linked to the first visit in the episode.
          - name: phq9_first_measure_date
            description: Date the baseline PHQ-9 score was recorded.
          - name: phq9_first_measure_visit_number
            description: Visit number at which the baseline PHQ-9 was administered.
          - name: phq9_first_measure_interpretation
            description: Severity interpretation of the baseline PHQ-9 score (0–4 minimal, 5–9 mild, 10–14 moderate, 15–19 moderately severe, 20–27 severe).
          - name: phq9_second_measure
            description: Second PHQ-9 score recorded in the episode.
          - name: phq9_last_measure
            description: Most recent PHQ-9 score recorded in the episode.
          - name: phq9_last_measure_date
            description: Date the most recent PHQ-9 score was recorded.
          - name: phq9_last_measure_visit_number
            description: Visit number at which the most recent PHQ-9 was administered.
          - name: phq9_last_measure_interpretation
            description: Severity interpretation of the most recent PHQ-9 score (0–4 minimal, 5–9 mild, 10–14 moderate, 15–19 moderately severe, 20–27 severe).
          - name: phq9_difference_first_to_last
            description: Raw score change from baseline to last PHQ-9 measurement. Negative values indicate improvement.
          - name: phq9_change_from_first_measure_percent
            description: Percent change from baseline to last PHQ-9 score. Negative values indicate improvement.
          - name: phq9_days_between_first_and_last
            description: Number of days elapsed between the baseline and last PHQ-9 assessments.
          - name: phq9_visits_between_first_and_last
            description: Number of visits between the baseline and last PHQ-9 assessments.
          - name: phq9_qualified_patient
            description: 1 if the patient meets qualified patient criteria for PHQ-9 reporting (baseline ≥ 5 on first visit, ≥ 2 measures on different dates with time elapsed).
          - name: phq9_achieved_MCID
            description: 1 if the patient achieved PHQ-9 MCID (reduction of ≥ 5 points from baseline).
          - name: phq9_achieved_50pct_response
            description: 1 if the patient achieved a ≥ 50% reduction in PHQ-9 score from baseline.
          - name: phq9_first_mcid_visit
            description: Visit number at which the patient first achieved PHQ-9 MCID.
          - name: phq9_achieved_first_mcid
            description: 1 if the patient achieved PHQ-9 MCID for the first time during this episode.
          - name: phq9_first_MCID_status
            description: Status label describing first PHQ-9 MCID achievement.
          - name: phq9_first_remission_visit
            description: Visit number at which the patient first achieved PHQ-9 remission (score < 5 after baseline ≥ 5).
          - name: phq9_achieved_first_remission
            description: 1 if the patient achieved PHQ-9 remission (baseline ≥ 5, then later score < 5).
          - name: phq9_first_remission_status
            description: Status label describing first PHQ-9 remission achievement.
          - name: phq9_visit_frequency
            description: Average number of days between PHQ-9 assessments.
          - name: gad7_total_measures
            description: Total number of GAD-7 assessments administered during the episode.
          - name: gad7_first_measure
            description: Baseline GAD-7 score — the first measure recorded, linked to the first visit in the episode.
          - name: gad7_first_measure_date
            description: Date the baseline GAD-7 score was recorded.
          - name: gad7_first_measure_visit_number
            description: Visit number at which the baseline GAD-7 was administered.
          - name: gad7_first_measure_interpretation
            description: Severity interpretation of the baseline GAD-7 score (0–4 minimal, 5–9 mild, 10–14 moderate, 15–21 severe).
          - name: gad7_second_measure
            description: Second GAD-7 score recorded in the episode.
          - name: gad7_last_measure
            description: Most recent GAD-7 score recorded in the episode.
          - name: gad7_last_measure_date
            description: Date the most recent GAD-7 score was recorded.
          - name: gad7_last_measure_visit_number
            description: Visit number at which the most recent GAD-7 was administered.
          - name: gad7_last_measure_interpretation
            description: Severity interpretation of the most recent GAD-7 score (0–4 minimal, 5–9 mild, 10–14 moderate, 15–21 severe).
          - name: gad7_difference_first_to_last
            description: Raw score change from baseline to last GAD-7 measurement. Negative values indicate improvement.
          - name: gad7_change_from_first_measure_percent
            description: Percent change from baseline to last GAD-7 score. Negative values indicate improvement.
          - name: gad7_days_between_first_and_last
            description: Number of days elapsed between the baseline and last GAD-7 assessments.
          - name: gad7_visits_between_first_and_last
            description: Number of visits between the baseline and last GAD-7 assessments.
          - name: gad7_qualified_patient
            description: 1 if the patient meets qualified patient criteria for GAD-7 reporting (baseline ≥ 5 on first visit, ≥ 2 measures on different dates with time elapsed).
          - name: gad7_achieved_MCID
            description: 1 if the patient achieved GAD-7 MCID (reduction of ≥ 4 points from baseline).
          - name: gad7_achieved_50pct_response
            description: 1 if the patient achieved a ≥ 50% reduction in GAD-7 score from baseline.
          - name: gad7_first_mcid_visit
            description: Visit number at which the patient first achieved GAD-7 MCID.
          - name: gad7_achieved_first_mcid
            description: 1 if the patient achieved GAD-7 MCID for the first time during this episode.
          - name: gad7_first_MCID_status
            description: Status label describing first GAD-7 MCID achievement.
          - name: gad7_first_remission_visit
            description: Visit number at which the patient first achieved GAD-7 remission (score < 5 after baseline ≥ 5).
          - name: gad7_achieved_first_remission
            description: 1 if the patient achieved GAD-7 remission (baseline ≥ 5, then later score < 5).
          - name: gad7_first_remission_status
            description: Status label describing first GAD-7 remission achievement.
          - name: gad7_visit_frequency
            description: Average number of days between GAD-7 assessments.
          - name: blended_first_score_interpretation
            description: Combined severity interpretation of the first PHQ-9 and GAD-7 scores for overall initial severity classification.
          - name: dx_codes
            description: Comma-separated list of ICD diagnosis codes associated with the patient.
          - name: depression
            description: 1 if the patient has a depression diagnosis.
          - name: anxiety_f41
            description: 1 if the patient has an anxiety disorder diagnosis (ICD F41).
          - name: ocd_f42
            description: 1 if the patient has an OCD diagnosis (ICD F42).
          - name: adjustment_disorder_ptsd_f43
            description: 1 if the patient has an adjustment disorder or PTSD diagnosis (ICD F43).
          - name: adhd_f90
            description: 1 if the patient has an ADHD diagnosis (ICD F90).
          - name: bipolar_disorder_f31
            description: 1 if the patient has a bipolar disorder diagnosis (ICD F31).
          - name: ccp_utilized
            description: Boolean — true if a Clinical Care Pathway was utilized for this patient.
          - name: outcomes_reviewed
            description: Boolean — true if outcomes were reviewed for this patient.
